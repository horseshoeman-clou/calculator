<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Calculator</title>

        <meta charset="UTF-8">
        <script src="script.js"></script>
        <link rel="stylesheet" href="style.css">

    </head>

    <body>
        
        <div class="calculator">
            <div class="display">0</div>
            <div class="buttons">
                <div class="row">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>/</button>
                </div>

                <div class="row">
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>x</button>
                </div>

                <div class="row">
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>-</button>
                </div>

                <div class="row">
                <button>.</button>
                <button>0</button>
                <button>=</button>
                <button>+</button>
                </div>
                
                <div class="row">
                <button class="clear-btn">Clear</button>
                </div>

            </div>
            </div>
        </div>
    </body>
</html>
